<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PurchaseOS — Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #030709;
      --surface:  #0a1a1f;
      --surface2: #0f2429;
      --border:   #152c33;
      --accent:   #00d4ff;
      --accent2:  #00b8e0;
      --accent3:  #00c2b3;
      --text:     #f0f6f4;
      --muted:    #4a6e78;
      --danger:   #ff4d6a;
      --mono:     'DM Mono', monospace;
      --sans:     'Poppins', sans-serif;
      --radius:   14px;
      --glow-accent: 0 0 20px rgba(0,212,255,0.2);
      --glow-strong: 0 0 40px rgba(0,212,255,0.3);
    }

    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* WindPulse cyan grid */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,212,255,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,212,255,0.025) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
      z-index: 0;
    }

    /* WindPulse ambient glow — kanan atas */
    body::after {
      content: '';
      position: fixed;
      top: -200px;
      right: -200px;
      width: 700px; height: 700px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(0,212,255,0.06) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .login-wrap {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 420px;
      padding: 20px;
      animation: fadeUp .4s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── BRAND ── */
    .brand {
      text-align: center;
      margin-bottom: 32px;
    }

    .brand-logo {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
    }

    .brand-icon {
      width: 38px; height: 38px;
      background: linear-gradient(135deg, var(--accent), var(--accent3));
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 19px;
      box-shadow: var(--glow-accent);
    }

    .brand-name {
      font-family: var(--mono);
      font-size: 21px;
      font-weight: 500;
      letter-spacing: -0.5px;
      color: var(--text);
    }

    .brand-sub {
      font-size: 12px;
      color: var(--muted);
      font-family: var(--mono);
      letter-spacing: 0.5px;
    }

    /* ── CARD ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 32px 28px;
      transition: border-color .2s, box-shadow .2s;
    }
    .card:hover {
      border-color: rgba(0,212,255,0.15);
      box-shadow: 0 0 28px rgba(0,212,255,0.04);
    }

    /* ── TABS ── */
    .tab-row {
      display: flex;
      gap: 4px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 4px;
      margin-bottom: 24px;
    }

    .tab-btn {
      flex: 1;
      padding: 8px;
      border: none;
      border-radius: 999px;
      font-family: var(--sans);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      background: transparent;
      color: var(--muted);
      transition: background .2s, color .2s;
    }
    .tab-btn.active {
      background: var(--accent);
      color: var(--bg);
      font-weight: 600;
    }

    /* ── ERROR / SUCCESS BOX ── */
    .error-box {
      display: none;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      margin-bottom: 16px;
      font-family: var(--sans);
      line-height: 1.5;
    }
    .error-box.show { display: block; }
    .error-box.is-error {
      background: rgba(255,77,106,0.1);
      border: 1px solid rgba(255,77,106,0.3);
      color: var(--danger);
    }
    .error-box.is-success {
      background: rgba(0,212,255,0.08);
      border: 1px solid rgba(0,212,255,0.3);
      color: var(--accent);
    }

    /* ── FIELDS ── */
    .field {
      margin-bottom: 16px;
    }

    label {
      display: block;
      font-size: 11px;
      font-family: var(--mono);
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 6px;
    }

    input[type="text"],
    input[type="email"],
    input[type="password"] {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: var(--mono);
      font-size: 14px;
      padding: 11px 14px;
      transition: border-color .2s, box-shadow .2s;
      outline: none;
    }

    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(0,212,255,0.1);
    }

    input::placeholder { color: var(--muted); }

    /* ── BUTTONS ── */
    .btn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      font-family: var(--sans);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .2s, transform .1s, box-shadow .2s;
      margin-top: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .btn:active { transform: scale(0.97); }

    .btn-primary {
      background: var(--accent);
      color: var(--bg);
      box-shadow: var(--glow-accent);
    }
    .btn-primary:hover { background: var(--accent2); box-shadow: var(--glow-strong); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

    .divider {
      display: flex; align-items: center; gap: 12px;
      margin: 18px 0;
      color: var(--muted);
      font-size: 11px;
      font-family: var(--mono);
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .btn-ghost {
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      color: var(--muted);
      font-size: 13px;
      padding: 10px;
      margin-top: 0;
    }
    .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }

    /* ── SPINNER ── */
    .spinner {
      display: inline-block;
      width: 15px; height: 15px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: var(--bg);
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── FOOTER ── */
    .footer-note {
      text-align: center;
      margin-top: 20px;
      font-size: 11px;
      color: var(--muted);
      font-family: var(--mono);
    }

    /* ── EMAIL CONFIRM NOTICE (muncul setelah verifikasi berhasil) ── */
    #confirmBanner {
      display: none;
      background: rgba(0,212,255,0.07);
      border: 1px solid rgba(0,212,255,0.25);
      border-radius: 10px;
      padding: 16px 18px;
      font-family: var(--mono);
      font-size: 12px;
      color: var(--accent);
      margin-bottom: 20px;
      line-height: 1.7;
      text-align: center;
    }
    #confirmBanner.show { display: block; }
    #confirmBanner strong { color: var(--text); display: block; font-size: 14px; margin-bottom: 4px; }
  </style>
</head>
<body>

<div class="login-wrap">
  <div class="brand">
    <div class="brand-logo">
      <div class="brand-icon">📦</div>
      <span class="brand-name">PurchaseOS</span>
    </div>
    <div class="brand-sub">// sistem manajemen pembelian</div>
  </div>

  <!-- Banner konfirmasi email berhasil -->
  <div id="confirmBanner">
    <strong>✓ Email berhasil dikonfirmasi!</strong>
    Silakan login dengan akun kamu di bawah.
  </div>

  <div class="card">
    <div class="tab-row">
      <button class="tab-btn active" onclick="switchTab('login')">Masuk</button>
      <button class="tab-btn" onclick="switchTab('register')">Daftar</button>
    </div>

    <div id="errorBox" class="error-box"></div>

    <!-- LOGIN FORM -->
    <div id="formLogin">
      <div class="field">
        <label>Email</label>
        <input type="email" id="loginEmail" placeholder="nama@perusahaan.com" autocomplete="email"/>
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="loginPass" placeholder="••••••••" autocomplete="current-password"/>
      </div>
      <button class="btn btn-primary" id="btnLogin" onclick="doLogin()">Masuk</button>
      <div class="divider">atau</div>
      <button class="btn btn-ghost" onclick="doForgot()">Lupa password?</button>
    </div>

    <!-- REGISTER FORM -->
    <div id="formRegister" style="display:none">
      <div class="field">
        <label>Nama Lengkap</label>
        <input type="text" id="regName" placeholder="John Doe"/>
      </div>
      <div class="field">
        <label>Email</label>
        <input type="email" id="regEmail" placeholder="nama@perusahaan.com"/>
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="regPass" placeholder="Min. 6 karakter"/>
      </div>
      <button class="btn btn-primary" id="btnRegister" onclick="doRegister()">Buat Akun</button>
    </div>
  </div>

  <div class="footer-note">purchasing-db &bull; powered by Supabase + Netlify</div>
</div>

<!-- ============================================================
     SUPABASE SDK
     ============================================================ -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="config.js"></script>
<script>
  (async () => {
    window._sb = supabase.createClient(APP_CONFIG.supabaseUrl, APP_CONFIG.supabaseKey);

    /* ── Handle redirect dari email verifikasi / reset password ──
       Supabase mengirim token di URL hash (#access_token=...&type=...)
       Kita perlu "exchange" token ini agar session aktif.               */
    const hash = window.location.hash;
    if (hash && hash.includes('access_token')) {
      const params = new URLSearchParams(hash.substring(1));
      const type   = params.get('type');

      if (type === 'signup' || type === 'email_change') {
        /* Konfirmasi email — Supabase v2 otomatis buat session dari hash */
        const { data, error } = await window._sb.auth.getSession();
        if (data?.session) {
          /* Langsung ke dashboard jika sudah punya session */
          window.location.replace('dashboard.html');
          return;
        }
        /* Jika tidak ada session (signInWithOtp flow), tunjukkan banner */
        document.getElementById('confirmBanner').classList.add('show');
        /* Bersihkan hash agar tidak terlihat di URL */
        history.replaceState(null, '', window.location.pathname);
      }

      if (type === 'recovery') {
        /* Link reset password — arahkan ke halaman reset password */
        window.location.replace('reset-password.html' + window.location.hash);
        return;
      }
    }

    /* Jika sudah login, langsung ke dashboard */
    const { data: { session } } = await window._sb.auth.getSession();
    if (session) {
      window.location.replace('dashboard.html');
    }
  })();
</script>

<script>
  /* ── TAB SWITCH ── */
  function switchTab(tab) {
    document.querySelectorAll('.tab-btn').forEach((b,i) =>
      b.classList.toggle('active', (i===0) === (tab==='login'))
    );
    document.getElementById('formLogin').style.display    = tab === 'login'    ? '' : 'none';
    document.getElementById('formRegister').style.display = tab === 'register' ? '' : 'none';
    showMsg('', '');
  }

  /* ── MESSAGE HELPER ── */
  function showMsg(msg, type) {
    const el = document.getElementById('errorBox');
    el.textContent = msg;
    el.className   = 'error-box' + (msg ? ' show' : '') + (type === 'success' ? ' is-success' : ' is-error');
  }
  function showError(msg)   { showMsg(msg, 'error'); }
  function showSuccess(msg) { showMsg(msg, 'success'); }

  /* ── TERJEMAHAN ERROR SUPABASE ── */
  function friendlyError(msg) {
    if (!msg) return 'Terjadi kesalahan. Coba lagi.';
    const m = msg.toLowerCase();
    if (m.includes('invalid login credentials') || m.includes('invalid credential'))
      return 'Email atau password salah.';
    if (m.includes('user already registered') || m.includes('already been registered'))
      return 'Email sudah digunakan.';
    if (m.includes('password should be at least'))
      return 'Password minimal 6 karakter.';
    if (m.includes('unable to validate email'))
      return 'Format email tidak valid.';
    if (m.includes('email not confirmed'))
      return 'Email belum dikonfirmasi. Cek inbox kamu.';
    if (m.includes('too many requests') || m.includes('rate limit'))
      return 'Terlalu banyak percobaan. Coba lagi nanti.';
    return msg;
  }

  /* ── SET LOADING ── */
  function setLoading(btnId, loading) {
    const btn = document.getElementById(btnId);
    btn.disabled = loading;
    if (loading) {
      btn.innerHTML = '<span class="spinner"></span>Memproses...';
    } else {
      btn.innerHTML = btnId === 'btnLogin' ? 'Masuk' : 'Buat Akun';
    }
  }

  /* ── LOGIN ── */
  async function doLogin() {
    const email = document.getElementById('loginEmail').value.trim();
    const pass  = document.getElementById('loginPass').value;
    if (!email || !pass) return showError('Isi email dan password.');
    showMsg('', '');
    setLoading('btnLogin', true);
    try {
      const { data, error } = await window._sb.auth.signInWithPassword({ email, password: pass });
      if (error) throw error;
      const { data: profile } = await window._sb
        .from('profiles')
        .select('role')
        .eq('id', data.user.id)
        .single();
      const role = profile?.role || 'user';
      sessionStorage.setItem('userRole', role);
      window.location.replace('dashboard.html');
    } catch(e) {
      showError(friendlyError(e.message));
      setLoading('btnLogin', false);
    }
  }

  /* ── REGISTER ── */
  async function doRegister() {
    const name  = document.getElementById('regName').value.trim();
    const email = document.getElementById('regEmail').value.trim();
    const pass  = document.getElementById('regPass').value;
    if (!name || !email || !pass) return showError('Isi semua kolom.');
    showMsg('', '');
    setLoading('btnRegister', true);
    try {
      const { error } = await window._sb.auth.signUp({
        email,
        password: pass,
        options: { data: { full_name: name, app: 'purchasing' } }
      });
      if (error) throw error;
      showSuccess('✓ Akun dibuat! Cek email untuk konfirmasi, lalu login di sini.');
      setLoading('btnRegister', false);
    } catch(e) {
      showError(friendlyError(e.message));
      setLoading('btnRegister', false);
    }
  }

  /* ── LUPA PASSWORD ── */
  async function doForgot() {
    const email = document.getElementById('loginEmail').value.trim();
    if (!email) return showError('Masukkan email kamu dulu di kolom email di atas.');
    showMsg('', '');
    try {
      const { error } = await window._sb.auth.resetPasswordForEmail(email, {
        redirectTo: window.location.origin + '/reset-password.html'
      });
      if (error) throw error;
      showSuccess('✓ Link reset password dikirim ke ' + email);
    } catch(e) {
      showError(friendlyError(e.message));
    }
  }

  /* ── ENTER KEY ── */
  document.addEventListener('keydown', e => {
    if (e.key !== 'Enter') return;
    if (document.getElementById('formLogin').style.display !== 'none') doLogin();
    else doRegister();
  });

  window.switchTab  = switchTab;
  window.doLogin    = doLogin;
  window.doRegister = doRegister;
  window.doForgot   = doForgot;
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PurchaseOS — Login</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0d0f14;
      --surface:  #161920;
      --border:   #252830;
      --accent:   #4f8ef7;
      --accent2:  #38d9a9;
      --text:     #e8eaf0;
      --muted:    #6b7280;
      --danger:   #f87171;
      --mono:     'DM Mono', monospace;
      --sans:     'DM Sans', sans-serif;
      --radius:   12px;
    }

    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(79,142,247,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(79,142,247,0.04) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
    }

    /* Ambient glow */
    body::after {
      content: '';
      position: fixed;
      width: 600px; height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(79,142,247,0.08) 0%, transparent 70%);
      top: 50%; left: 50%;
      transform: translate(-50%, -60%);
      pointer-events: none;
    }

    .login-wrap {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 420px;
      padding: 20px;
      animation: fadeUp .5s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .brand {
      text-align: center;
      margin-bottom: 36px;
    }

    .brand-logo {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }

    .brand-icon {
      width: 40px; height: 40px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
    }

    .brand-name {
      font-family: var(--mono);
      font-size: 22px;
      font-weight: 500;
      letter-spacing: -0.5px;
      color: var(--text);
    }

    .brand-sub {
      font-size: 13px;
      color: var(--muted);
      font-family: var(--mono);
      letter-spacing: 0.5px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 36px 32px;
    }

    .card-title {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 6px;
    }

    .card-desc {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 28px;
    }

    .field {
      margin-bottom: 16px;
    }

    label {
      display: block;
      font-size: 12px;
      font-family: var(--mono);
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 6px;
    }

    input[type="text"],
    input[type="email"],
    input[type="password"] {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: var(--mono);
      font-size: 14px;
      padding: 11px 14px;
      transition: border-color .2s, box-shadow .2s;
      outline: none;
    }

    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(79,142,247,0.12);
    }

    .btn {
      width: 100%;
      padding: 13px;
      border: none;
      border-radius: 8px;
      font-family: var(--sans);
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .2s, transform .1s;
      margin-top: 8px;
    }
    .btn:active { transform: scale(0.98); }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent), #3b7de8);
      color: #fff;
    }
    .btn-primary:hover { opacity: 0.9; }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

    .divider {
      display: flex; align-items: center; gap: 12px;
      margin: 20px 0;
      color: var(--muted);
      font-size: 12px;
      font-family: var(--mono);
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .btn-ghost {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      font-size: 13px;
      padding: 10px;
      margin-top: 0;
    }
    .btn-ghost:hover { border-color: var(--accent); color: var(--text); }

    .error-box {
      display: none;
      background: rgba(248,113,113,0.1);
      border: 1px solid rgba(248,113,113,0.3);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      color: var(--danger);
      margin-bottom: 16px;
    }
    .error-box.show { display: block; }

    .tab-row {
      display: flex;
      gap: 4px;
      background: var(--bg);
      border-radius: 8px;
      padding: 4px;
      margin-bottom: 24px;
    }

    .tab-btn {
      flex: 1;
      padding: 8px;
      border: none;
      border-radius: 6px;
      font-family: var(--sans);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      background: transparent;
      color: var(--muted);
      transition: background .2s, color .2s;
    }
    .tab-btn.active {
      background: var(--surface);
      color: var(--text);
    }

    .spinner {
      display: inline-block;
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .footer-note {
      text-align: center;
      margin-top: 20px;
      font-size: 12px;
      color: var(--muted);
      font-family: var(--mono);
    }

    /* CONFIG NOTICE */
    .config-notice {
      background: rgba(79,142,247,0.08);
      border: 1px dashed rgba(79,142,247,0.4);
      border-radius: 8px;
      padding: 14px 16px;
      font-size: 12px;
      font-family: var(--mono);
      color: var(--accent);
      margin-bottom: 20px;
      line-height: 1.7;
    }
    .config-notice strong { color: var(--text); }
  </style>
</head>
<body>

<div class="login-wrap">
  <div class="brand">
    <div class="brand-logo">
      <div class="brand-icon">📦</div>
      <span class="brand-name">PurchaseOS</span>
    </div>
    <div class="brand-sub">// sistem manajemen pembelian</div>
  </div>

  <div class="card">
    <div class="tab-row">
      <button class="tab-btn active" onclick="switchTab('login')">Masuk</button>
      <button class="tab-btn" onclick="switchTab('register')">Daftar</button>
    </div>

    <div id="errorBox" class="error-box"></div>

    <!-- LOGIN FORM -->
    <div id="formLogin">
      <div class="field">
        <label>Email</label>
        <input type="email" id="loginEmail" placeholder="nama@perusahaan.com" autocomplete="email"/>
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="loginPass" placeholder="••••••••" autocomplete="current-password"/>
      </div>
      <button class="btn btn-primary" id="btnLogin" onclick="doLogin()">Masuk</button>
      <div class="divider">atau</div>
      <button class="btn btn-ghost" onclick="doForgot()">Lupa password?</button>
    </div>

    <!-- REGISTER FORM -->
    <div id="formRegister" style="display:none">
      <div class="field">
        <label>Nama Lengkap</label>
        <input type="text" id="regName" placeholder="John Doe"/>
      </div>
      <div class="field">
        <label>Email</label>
        <input type="email" id="regEmail" placeholder="nama@perusahaan.com"/>
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="regPass" placeholder="Min. 6 karakter"/>
      </div>
      <button class="btn btn-primary" id="btnRegister" onclick="doRegister()">Buat Akun</button>
    </div>
  </div>

  <div class="footer-note">purchasing-db &bull; powered by Supabase + Netlify</div>
</div>

<!-- ============================================================
     SUPABASE SDK
     ============================================================ -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>

<script>
  /* ── TAB SWITCH ── */
  function switchTab(tab) {
    document.querySelectorAll('.tab-btn').forEach((b,i) =>
      b.classList.toggle('active', (i===0) === (tab==='login'))
    );
    document.getElementById('formLogin').style.display    = tab === 'login'    ? '' : 'none';
    document.getElementById('formRegister').style.display = tab === 'register' ? '' : 'none';
    showError('');
  }

  /* ── ERROR HELPER ── */
  function showError(msg) {
    const el = document.getElementById('errorBox');
    el.textContent = msg;
    el.classList.toggle('show', !!msg);
  }

  /* ── TERJEMAHAN ERROR SUPABASE ── */
  function friendlyError(msg) {
    if (!msg) return 'Terjadi kesalahan. Coba lagi.';
    const m = msg.toLowerCase();
    if (m.includes('invalid login credentials') || m.includes('invalid credential'))
      return 'Email atau password salah.';
    if (m.includes('user already registered') || m.includes('already been registered'))
      return 'Email sudah digunakan.';
    if (m.includes('password should be at least'))
      return 'Password minimal 6 karakter.';
    if (m.includes('unable to validate email'))
      return 'Format email tidak valid.';
    if (m.includes('email not confirmed'))
      return 'Email belum dikonfirmasi. Cek inbox kamu.';
    if (m.includes('too many requests') || m.includes('rate limit'))
      return 'Terlalu banyak percobaan. Coba lagi nanti.';
    return msg;
  }

  /* ── SET LOADING ── */
  function setLoading(btnId, loading) {
    const btn = document.getElementById(btnId);
    btn.disabled = loading;
    btn.innerHTML = loading
      ? '<span class="spinner"></span>Memproses...'
      : (btnId === 'btnLogin' ? 'Masuk' : 'Buat Akun');
  }

  /* ── LOGIN ── */
  async function doLogin() {
    const email = document.getElementById('loginEmail').value.trim();
    const pass  = document.getElementById('loginPass').value;
    if (!email || !pass) return showError('Isi email dan password.');
    showError('');
    setLoading('btnLogin', true);
    try {
      const { data, error } = await window._sb.auth.signInWithPassword({ email, password: pass });
      if (error) throw error;
      /* Fetch role dari tabel profiles */
      const { data: profile } = await window._sb
        .from('profiles')
        .select('role')
        .eq('id', data.user.id)
        .single();
      const role = profile?.role || 'user';
      sessionStorage.setItem('userRole', role);
      window.location.href = 'dashboard.html';
    } catch(e) {
      showError(friendlyError(e.message));
      setLoading('btnLogin', false);
    }
  }

  /* ── REGISTER ── */
  async function doRegister() {
    const name  = document.getElementById('regName').value.trim();
    const email = document.getElementById('regEmail').value.trim();
    const pass  = document.getElementById('regPass').value;
    if (!name || !email || !pass) return showError('Isi semua kolom.');
    showError('');
    setLoading('btnRegister', true);
    try {
      const { error } = await window._sb.auth.signUp({
        email,
        password: pass,
        options: { data: { full_name: name } }
      });
      if (error) throw error;
      /* Show success — user may need to confirm email depending on Supabase settings */
      document.getElementById('errorBox').style.background   = 'rgba(56,217,169,0.1)';
      document.getElementById('errorBox').style.borderColor  = 'rgba(56,217,169,0.3)';
      document.getElementById('errorBox').style.color        = '#38d9a9';
      document.getElementById('errorBox').textContent        = '✓ Akun dibuat! Cek email untuk konfirmasi, lalu login.';
      document.getElementById('errorBox').classList.add('show');
      setLoading('btnRegister', false);
    } catch(e) {
      showError(friendlyError(e.message));
      setLoading('btnRegister', false);
    }
  }

  /* ── LUPA PASSWORD ── */
  async function doForgot() {
    const email = document.getElementById('loginEmail').value.trim();
    if (!email) return showError('Masukkan email kamu dulu di kolom email di atas.');
    showError('');
    try {
      const { error } = await window._sb.auth.resetPasswordForEmail(email);
      if (error) throw error;
      document.getElementById('errorBox').style.background   = 'rgba(56,217,169,0.1)';
      document.getElementById('errorBox').style.borderColor  = 'rgba(56,217,169,0.3)';
      document.getElementById('errorBox').style.color        = '#38d9a9';
      document.getElementById('errorBox').textContent        = '✓ Link reset password dikirim ke ' + email;
      document.getElementById('errorBox').classList.add('show');
    } catch(e) {
      showError(friendlyError(e.message));
    }
  }

  /* ── ENTER KEY ── */
  document.addEventListener('keydown', e => {
    if (e.key !== 'Enter') return;
    if (document.getElementById('formLogin').style.display !== 'none') doLogin();
    else doRegister();
  });

  /* Expose ke global */
  window.switchTab  = switchTab;
  window.doLogin    = doLogin;
  window.doRegister = doRegister;
  window.doForgot   = doForgot;
</script>
</body>
</html>

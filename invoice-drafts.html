<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PurchaseOS — Invoice Drafts</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
  <link rel="stylesheet" href="theme.css"/>
  <script src="sidebar.js"></script>
  <style>
    /* Status tab filter */
    .status-tab{background:none;border:none;cursor:pointer;padding:6px 14px;border-radius:7px;font-size:12px;font-family:var(--sans);color:var(--muted);transition:all .15s ease;white-space:nowrap;font-weight:500}
    .status-tab:hover{color:var(--text);background:rgba(255,255,255,0.06)}
    .status-tab.active{background:var(--accent);color:#000;font-weight:700;box-shadow:0 0 12px rgba(0,212,255,0.3)}
    body.light-mode .status-tab.active{background:var(--accent);color:#000;box-shadow:0 0 12px rgba(0,212,255,0.25)}

    /* Mobile: drawer pattern untuk draft list */
    .draft-drawer-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:140;backdrop-filter:blur(2px)}
    .draft-drawer-overlay.show{display:block}
    /* Lock viewport — no page scroll */
    body, .main { min-height: unset !important; height: 100vh !important; overflow: hidden !important; }
    .main { display: flex; flex-direction: column; }

    @media(max-width:768px){
      #btnOpenDraftDrawer{display:inline-flex !important}
      #draftListPanel{position:fixed !important;top:var(--topbar-h,60px);left:0;bottom:0;width:88vw;max-width:340px;z-index:150;background:var(--surface);transform:translateX(-100%);transition:transform .28s cubic-bezier(.4,0,.2,1);box-shadow:4px 0 24px rgba(0,0,0,.5)}
      #draftListPanel.drawer-open{transform:translateX(0)}
      #reviewPanel{width:100% !important;flex:1 1 100% !important}
      #reviewContent{flex-direction:column !important}
      #imgViewerPanel{width:100% !important;max-height:42vh;border-right:none !important;border-bottom:1px solid var(--border)}
      #correctionForm{flex:1 1 auto !important}
    }
  </style>
</head>
<body>
<div id="page-loader"><div class="loader-ring"></div></div>
<script src="loader.js"></script>
<div class="overlay" id="overlay" onclick="closeSidebar()"></div>
<aside class="sidebar" id="sidebar"></aside>

<main class="main">
  <div class="topbar" id="mainTopbar" style="z-index:200">
    <div>
      <button class="menu-toggle" onclick="toggleSidebar()">☰</button>
      <div class="page-title">Invoice Drafts</div>
      <div class="page-sub" id="activeBrandLabel">Semua Brand</div>
    </div>
    <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
      <span id="draftCountChip" style="display:none;font-family:var(--mono);font-size:12px;padding:5px 10px;border-radius:14px;background:rgba(0,212,255,0.10);color:var(--accent);border:1px solid rgba(0,212,255,0.25)"></span>
      <select id="filterBrand" onchange="onFilterBrandChange()" class="filter-select" title="Filter berdasarkan brand">
        <option value="all">Semua Brand</option>
      </select>
      <div id="statusTabBar" style="display:flex;gap:2px;background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:10px;padding:3px">
        <button class="status-tab active" data-status="needs_review" onclick="setStatusTab('needs_review')">Perlu Review</button>
        <button class="status-tab" data-status="confirmed"    onclick="setStatusTab('confirmed')">Confirmed</button>
        <button class="status-tab" data-status="rejected"     onclick="setStatusTab('rejected')">Rejected</button>
        <button class="status-tab" data-status=""             onclick="setStatusTab('')">Semua</button>
      </div>
      <select id="filterStatus" style="display:none">
        <option value="needs_review">Perlu Review</option>
        <option value="confirmed">Confirmed</option>
        <option value="rejected">Rejected</option>
        <option value="">Semua Status</option>
      </select>
      <button id="btnRefreshData" class="btn btn-ghost" onclick="refreshDraftsData()"
        style="padding:0 14px;height:36px"
        title="Paksa reload draft & data master">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.36"/></svg>
        Refresh Data
      </button>
      <!-- Mobile: tombol buka drawer draft list -->
      <button class="btn btn-ghost btn-sm" id="btnOpenDraftDrawer" onclick="document.getElementById('draftListPanel').classList.toggle('drawer-open');document.getElementById('draftDrawerOverlay').classList.toggle('show')" style="display:none">☰ Daftar</button>
    </div>
  </div>

  <div class="draft-drawer-overlay" id="draftDrawerOverlay" onclick="document.getElementById('draftListPanel').classList.remove('drawer-open');this.classList.remove('show')"></div>
  <div class="content" style="padding:0;flex:1;min-height:0;overflow:hidden;position:relative">
    <!-- Brand Selection Screen -->
    <div id="brandSelectScreen" style="position:absolute;inset:0;background:var(--bg);z-index:20;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px;padding:40px">
      <div style="text-align:center">
        <div style="font-size:32px;margin-bottom:12px">🏷️</div>
        <div style="font-size:20px;font-weight:700;color:var(--text);margin-bottom:6px">Pilih Brand</div>
        <div style="font-size:13px;color:var(--muted)">Invoice draft akan ditampilkan berdasarkan brand yang dipilih</div>
      </div>
      <div id="brandSelectGrid" style="display:flex;flex-wrap:wrap;gap:12px;justify-content:center;max-width:700px"></div>
    </div>

    <div id="draftsLayout" style="display:flex;height:100%">

      <!-- LEFT: Draft list -->
      <div id="draftListPanel" style="width:300px;flex-shrink:0;border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;min-height:0">
        <div style="padding:12px;border-bottom:1px solid var(--border);flex-shrink:0">
          <div class="search-wrap" style="position:relative">
            <span class="search-icon">🔍</span>
            <input id="searchDraft" class="search-input" placeholder="Cari vendor / invoice..." oninput="filterDraftList()"/>
          </div>
        </div>
        <div id="draftItems" style="flex:1;overflow-y:auto;padding:10px"></div>
        <div id="draftPagin" style="flex-shrink:0;display:none;align-items:center;justify-content:space-between;padding:8px 10px;border-top:1px solid var(--border);gap:6px"></div>
      </div>

      <!-- RIGHT: Review panel -->
      <div id="reviewPanel" style="flex:1;min-height:0;overflow:hidden;display:flex;flex-direction:column">
        <div id="emptyReview" style="flex:1;display:flex;align-items:center;justify-content:center">
          <div class="empty-state" style="text-align:center;color:var(--muted);padding:40px">
            <div style="font-size:48px;margin-bottom:16px">📋</div>
            <div>Pilih draft dari daftar untuk mulai review</div>
          </div>
        </div>
        <div id="reviewContent" style="display:none;flex:1;overflow:hidden;flex-direction:row">
          <!-- Image viewer -->
          <div id="imgViewerPanel" style="width:45%;border-right:1px solid var(--border);display:flex;flex-direction:column;background:var(--surface);flex-shrink:0">
            <div style="padding:5px 10px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:3px;background:var(--surface2);flex-shrink:0;justify-content:flex-end">
              <span style="font-size:10px;font-family:var(--mono);color:var(--muted);margin-right:auto;opacity:.7">🖱 Drag geser &nbsp;·&nbsp; Ctrl+Scroll zoom</span>
              <button onclick="draftImgRotate(-1)" title="Putar kiri" style="width:26px;height:26px;border-radius:5px;border:1px solid var(--border);background:var(--bg);color:var(--text);cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center">↺</button>
              <span id="draftRotateLbl" style="font-size:10px;font-family:var(--mono);color:var(--muted);min-width:26px;text-align:center">0°</span>
              <button onclick="draftImgRotate(1)" title="Putar kanan" style="width:26px;height:26px;border-radius:5px;border:1px solid var(--border);background:var(--bg);color:var(--text);cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center">↻</button>
              <div style="width:1px;height:16px;background:var(--border);margin:0 2px"></div>
              <button onclick="draftImgZoom(-1)" title="Zoom out" style="width:26px;height:26px;border-radius:5px;border:1px solid var(--border);background:var(--bg);color:var(--text);cursor:pointer;font-size:16px;line-height:1;display:flex;align-items:center;justify-content:center">−</button>
              <span id="draftZoomLabel" style="font-size:11px;font-family:var(--mono);color:var(--muted);min-width:34px;text-align:center">75%</span>
              <button onclick="draftImgZoom(1)" title="Zoom in" style="width:26px;height:26px;border-radius:5px;border:1px solid var(--border);background:var(--bg);color:var(--text);cursor:pointer;font-size:16px;line-height:1;display:flex;align-items:center;justify-content:center">＋</button>
              <button onclick="draftImgReset()" title="Reset zoom & rotate" style="padding:0 7px;height:26px;border-radius:5px;border:1px solid var(--border);background:var(--bg);color:var(--muted);cursor:pointer;font-size:10px;font-family:var(--mono)">⟳</button>
            </div>
            <div id="draftImgContainer" style="flex:1;position:relative;overflow:hidden;background:var(--bg)">
              <div id="draftImgView" style="position:absolute;inset:0;overflow:auto;cursor:grab;user-select:none">
                <div id="draftImgInner" style="display:block;padding:8px;box-sizing:border-box">
                  <img id="draftImgEl" src="" alt="Invoice" style="display:block;border-radius:4px;" draggable="false"/>
                </div>
              </div>
            </div>
          </div>

          <!-- Correction form -->
          <div id="correctionForm" style="flex:1;overflow:hidden;display:flex;flex-direction:column">

            <div style="flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:20px">

              <!-- Card: Informasi Invoice -->
              <div class="card" style="overflow:visible">
                <div class="card-header">
                  <span class="card-title">Informasi Invoice</span>
                  <span id="draftStatusChip" style="font-family:var(--mono);font-size:11px;padding:3px 9px;border-radius:10px"></span>
                </div>
                <div class="card-body" id="infoSection"></div>
              </div>

              <!-- Card: Daftar Barang — overflow visible supaya dropdown gak terpotong card -->
              <div class="card" style="overflow:visible">
                <div class="card-header">
                  <span class="card-title">Daftar Barang</span>
                  <span id="itemCountChip" style="font-family:var(--mono);font-size:12px;color:var(--muted)">0 item</span>
                </div>
                <div class="card-body" style="overflow:visible;padding:16px 20px" id="itemsSection"></div>
              </div>

            </div>

            <!-- Sticky action bar -->
            <div id="summarySection" style="flex-shrink:0;border-top:1px solid var(--border);background:rgba(10,26,31,0.85);backdrop-filter:blur(12px);padding:16px 24px;position:sticky;bottom:0;z-index:10"></div>

          </div>
        </div>
      </div>

    </div>
  </div>
</main>

<!-- Reject modal -->
<div class="modal-overlay" id="rejectModal" style="display:none" onclick="if(event.target===this)closeRejectModal()">
  <div class="modal" style="max-width:400px">
    <div class="modal-header">
      <div class="modal-title">Tolak Draft</div>
      <button class="modal-close" onclick="closeRejectModal()">✕</button>
    </div>
    <div style="padding:16px">
      <label style="font-size:13px;color:var(--muted);display:block;margin-bottom:6px">Alasan (opsional)</label>
      <textarea id="rejectReason" class="search-input" style="width:100%;box-sizing:border-box;height:80px;resize:vertical;font-family:inherit" placeholder="Tulis alasan penolakan..."></textarea>
    </div>
    <div class="modal-footer">
      <button class="btn-ghost" onclick="closeRejectModal()">Batal</button>
      <button class="btn-primary" style="background:var(--danger);border-color:var(--danger)" onclick="doReject()">Tolak Draft</button>
    </div>
  </div>
</div>


<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="config.js"></script>
<script>window._sb = supabase.createClient(APP_CONFIG.supabaseUrl, APP_CONFIG.supabaseKey);</script>
<script src="auth.js"></script>
<script src="ppn.js"></script>
<script src="invoice-drafts.js"></script>
</body>
</html>

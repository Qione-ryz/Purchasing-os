<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5BC8A8"/>
      <stop offset="100%" stop-color="#D4A030"/>
    </linearGradient>
    <linearGradient id="top" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#E8C048"/>
      <stop offset="100%" stop-color="#F5D870"/>
    </linearGradient>
    <linearGradient id="left" x1="100%" y1="0%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#B86820"/>
      <stop offset="100%" stop-color="#985018"/>
    </linearGradient>
    <linearGradient id="right" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#D88030"/>
      <stop offset="100%" stop-color="#C07028"/>
    </linearGradient>
  </defs>
  <!-- Rounded background -->
  <rect x="0" y="0" width="100" height="100" rx="22" fill="url(#bg)"/>
  <!-- Top face -->
  <polygon points="50,18 80,34 50,50 20,34" fill="url(#top)"/>
  <!-- Left face -->
  <polygon points="20,34 50,50 50,78 20,62" fill="url(#left)"/>
  <!-- Right face -->
  <polygon points="50,50 80,34 80,62 50,78" fill="url(#right)"/>
  <!-- Seam line top -->
  <line x1="50" y1="18" x2="50" y2="50" stroke="#fff" stroke-width="1.2" stroke-opacity="0.35"/>
  <line x1="20" y1="34" x2="80" y2="34" stroke="#fff" stroke-width="1.2" stroke-opacity="0.35"/>
  <!-- Edge highlights -->
  <polygon points="50,18 80,34 50,50 20,34" fill="none" stroke="#fff" stroke-width="0.8" stroke-opacity="0.25"/>
  <polygon points="20,34 50,50 50,78 20,62" fill="none" stroke="#000" stroke-width="0.6" stroke-opacity="0.15"/>
  <polygon points="50,50 80,34 80,62 50,78" fill="none" stroke="#000" stroke-width="0.6" stroke-opacity="0.15"/>
</svg>
